name: Build Tiny Tapeout Project

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '10.3-2021.10'

      - name: Install OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build project
        run: |
          make -C src/src CROSS_COMPILE=arm-none-eabi- firmware.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src/src/firmware.bin
            src/src/firmware.elf

  test:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: src/src

      - name: Run Renode tests
        uses: antmicro/renode-test-action@v4
        with:
          tests-to-run: test/renode/tt_serial.robot
