<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Tapeout Projects - Web Tester</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <h1>Tiny Tapeout Projects</h1>

        <nav class="nav-tabs">
            <a href="index.html" class="nav-link">Web Tester</a>
            <a href="projects.html" class="nav-link active">Projects</a>
            <a href="flasher.html" class="nav-link">SRAM Flasher</a>
        </nav>

        <div class="panel">
            <div class="testset-actions">
                <input type="text" id="projectSearch" placeholder="Search projects by ID or title..." class="md-url-input">
            </div>
            <div class="table-responsive">
                <table class="tester-table" id="projectsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Simulation (WASM)</th>
                            <th>Testset (YAML)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="projectsBody">
                        <tr>
                            <td colspan="5">Loading projects from GitHub...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="projects.js"></script>
</body>
</html>
