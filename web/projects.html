<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Tapeout Projects</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .project-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-color: #007bff;
        }
        .project-info h3 {
            margin: 0 0 5px 0;
            color: #007bff;
        }
        .project-info p {
            margin: 0;
            color: #65676b;
            font-size: 0.9em;
        }
        .project-meta {
            text-align: right;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-wasm {
            background-color: #28a745;
            color: white;
        }
        .badge-no-wasm {
            background-color: #6c757d;
            color: white;
        }
        .search-container {
            margin-bottom: 20px;
            width: 100%;
        }
        #projectSearch {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #65676b;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1>Tiny Tapeout Projects</h1>

        <nav class="nav-tabs">
            <a href="index.html" class="nav-link">Web Tester</a>
            <a href="flasher.html" class="nav-link">SRAM Flasher</a>
            <a href="projects.html" class="nav-link active">Select Project</a>
        </nav>

        <div class="panel main-panel">
            <div class="search-container">
                <input type="text" id="projectSearch" placeholder="Search projects by ID or title (e.g., tt3990, multiplier)...">
            </div>
            <div id="projectList">
                <div class="loading">Loading projects from GitHub...</div>
            </div>
        </div>
    </div>
    <script src="projects.js"></script>
</body>
</html>
