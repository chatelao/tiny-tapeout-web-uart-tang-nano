<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Tapeout Web Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <h1>Tiny Tapeout Web Tester</h1>

        <div class="panel main-panel">
            <table class="tester-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>ui_in [7:0]</th>
                        <th>uio_in [7:0]</th>
                        <th>clk</th>
                        <th>rst_n</th>
                        <th>ena</th>
                        <th>uo_out [7:0]</th>
                        <th>uio_out [7:0]</th>
                        <th>uio_oe [7:0]</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody class="input-section">
                    <tr class="input-row">
                        <td class="time-cell">-</td>
                        <td>
                            <div class="bits" id="ui_in">
                                <input type="checkbox" title="7"><input type="checkbox" title="6"><input type="checkbox" title="5"><input type="checkbox" title="4"><input type="checkbox" title="3"><input type="checkbox" title="2"><input type="checkbox" title="1"><input type="checkbox" title="0">
                            </div>
                        </td>
                        <td>
                            <div class="bits" id="uio_in">
                                <input type="checkbox" title="7"><input type="checkbox" title="6"><input type="checkbox" title="5"><input type="checkbox" title="4"><input type="checkbox" title="3"><input type="checkbox" title="2"><input type="checkbox" title="1"><input type="checkbox" title="0">
                            </div>
                        </td>
                        <td class="center-cell">
                            <select id="clk">
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="1/0">1/0</option>
                            </select>
                        </td>
                        <td class="center-cell"><input type="checkbox" id="rst_n" checked></td>
                        <td class="center-cell"><input type="checkbox" id="ena" checked></td>
                        <td colspan="3" class="results-placeholder">Ready to send...</td>
                        <td><button id="sendReceive">Send</button></td>
                    </tr>
                </tbody>
                <tbody id="history">
                    <!-- History rows will be prepended here -->
                </tbody>
            </table>
            <div class="tbd">WebSerial TBD</div>
        </div>

        <div class="panel console-panel">
            <h2>Serial Console</h2>
            <div id="console" class="console"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
