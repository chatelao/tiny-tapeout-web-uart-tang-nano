<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Tapeout Web Tester</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <h1>Tiny Tapeout Web Tester</h1>

        <nav class="nav-tabs">
            <a href="index.html" class="nav-link active">Web Tester</a>
            <a href="flasher.html" class="nav-link">SRAM Flasher</a>
        </nav>

        <div class="panel main-panel">
            <div class="table-actions">
                <button id="exportCsv">Export CSV</button>
                <button id="clearData">Reset</button>
            </div>
            <table class="tester-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>ui_in [7:0]</th>
                        <th class="col-uio_in">
                            <input type="checkbox" id="toggle-uio_in" checked title="Toggle uio_in visibility">
                            uio_in [7:0]
                        </th>
                        <th>clk</th>
                        <th>rst_n</th>
                        <th>ena</th>
                        <th>uo_out [7:0]</th>
                        <th class="col-uio_out">
                            <input type="checkbox" id="toggle-uio_out" checked title="Toggle uio_out visibility">
                            uio_out [7:0]
                        </th>
                        <th class="col-uio_oe">
                            <input type="checkbox" id="toggle-uio_oe" checked title="Toggle uio_oe visibility">
                            uio_oe [7:0]
                        </th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody class="input-section">
                    <tr class="input-row">
                        <td class="time-cell">-</td>
                        <td>
                            <div class="bits-container">
                                <div class="bits" id="ui_in">
                                    <input type="checkbox" title="7"><input type="checkbox" title="6"><input type="checkbox" title="5"><input type="checkbox" title="4"><input type="checkbox" title="3"><input type="checkbox" title="2"><input type="checkbox" title="1"><input type="checkbox" title="0">
                                </div>
                                <div class="hex-entry">
                                    <span class="hex-prefix">0x</span>
                                    <input type="text" class="hex-input" id="ui_in_hex" maxlength="2" value="00">
                                    <button class="hex-reset" id="ui_in_reset" title="Reset to 0x00">&times;</button>
                                </div>
                            </div>
                        </td>
                        <td class="col-uio_in">
                            <div class="bits-container">
                                <div class="bits" id="uio_in">
                                    <input type="checkbox" title="7"><input type="checkbox" title="6"><input type="checkbox" title="5"><input type="checkbox" title="4"><input type="checkbox" title="3"><input type="checkbox" title="2"><input type="checkbox" title="1"><input type="checkbox" title="0">
                                </div>
                                <div class="hex-entry">
                                    <span class="hex-prefix">0x</span>
                                    <input type="text" class="hex-input" id="uio_in_hex" maxlength="2" value="00">
                                    <button class="hex-reset" id="uio_in_reset" title="Reset to 0x00">&times;</button>
                                </div>
                            </div>
                        </td>
                        <td class="center-cell">
                            <select id="clk">
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="1/0" selected>1/0</option>
                            </select>
                        </td>
                        <td class="center-cell"><input type="checkbox" id="rst_n" checked></td>
                        <td class="center-cell"><input type="checkbox" id="ena" checked></td>
                        <td class="results-placeholder">Ready to send...</td>
                        <td class="col-uio_out results-placeholder"></td>
                        <td class="col-uio_oe results-placeholder"></td>
                        <td>
                            <button id="sendReceive">Send</button>
                        </td>
                    </tr>
                </tbody>
                <tbody id="history">
                    <!-- History rows will be prepended here -->
                </tbody>
            </table>
            <div class="tbd">WebSerial TBD</div>
        </div>

        <div class="panel testset-panel">
            <h2>Testset Framework</h2>
            <div class="testset-actions">
                <select id="testsetSelect">
                    <option value="">Loading testsets...</option>
                </select>
                <button id="loadTestset">Load</button>
                <button id="runTestset" disabled>Run Testset</button>
                <button id="copyPermalink">Copy Permalink</button>
            </div>
            <div id="testsetInfo" class="testset-info">
                No testset loaded.
            </div>
        </div>

        <div class="panel console-panel">
            <h2>Serial Console</h2>
            <div id="console" class="console"></div>
        </div>

        <div class="panel diagram-panel">
            <h2>Timing Diagram</h2>
            <div class="diagram-controls">
                <div class="control-group">
                    <label for="type-ui_in">ui_in:</label>
                    <select id="type-ui_in" class="diagram-type">
                        <option value="hex" selected>Hex</option>
                        <option value="dec">Dec</option>
                        <option value="bin">Bin</option>
                        <option value="bits">Bits</option>
                        <option value="fp8">FP8</option>
                        <option value="dual_fp4">Dual FP4</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="type-uio_in">uio_in:</label>
                    <select id="type-uio_in" class="diagram-type">
                        <option value="hex" selected>Hex</option>
                        <option value="dec">Dec</option>
                        <option value="bin">Bin</option>
                        <option value="bits">Bits</option>
                        <option value="fp8">FP8</option>
                        <option value="dual_fp4">Dual FP4</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="type-clk">clk:</label>
                    <select id="type-clk" class="diagram-type">
                        <option value="binary" selected>Binary</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="type-rst_n">rst_n:</label>
                    <select id="type-rst_n" class="diagram-type">
                        <option value="binary" selected>Binary</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="type-ena">ena:</label>
                    <select id="type-ena" class="diagram-type">
                        <option value="binary" selected>Binary</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="type-uo_out">uo_out:</label>
                    <select id="type-uo_out" class="diagram-type">
                        <option value="hex" selected>Hex</option>
                        <option value="dec">Dec</option>
                        <option value="bin">Bin</option>
                        <option value="bits">Bits</option>
                        <option value="fp8">FP8</option>
                        <option value="dual_fp4">Dual FP4</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="type-uio_out">uio_out:</label>
                    <select id="type-uio_out" class="diagram-type">
                        <option value="hex" selected>Hex</option>
                        <option value="dec">Dec</option>
                        <option value="bin">Bin</option>
                        <option value="bits">Bits</option>
                        <option value="fp8">FP8</option>
                        <option value="dual_fp4">Dual FP4</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="type-uio_oe">uio_oe:</label>
                    <select id="type-uio_oe" class="diagram-type">
                        <option value="hex" selected>Hex</option>
                        <option value="dec">Dec</option>
                        <option value="bin">Bin</option>
                        <option value="bits">Bits</option>
                        <option value="fp8">FP8</option>
                        <option value="dual_fp4">Dual FP4</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="diagram-scaling">Scaling:</label>
                    <select id="diagram-scaling">
                        <option value="fit" selected>Fit to Width</option>
                        <option value="details">More Details</option>
                    </select>
                </div>
            </div>
            <div id="diagram-container">
                <img id="diagram-img" alt="Timing Diagram will appear here after first transaction" />
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
